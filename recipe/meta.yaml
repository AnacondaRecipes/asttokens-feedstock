{% set name = "asttokens" %}
{% set version = "3.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: 71a4ee5de0bde6a31d64f6b13f2293ac190344478f081c3d1bccfcf5eacb0cb7

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --ignore-installed --no-cache-dir -vv
  skip: true  # [py<38]

requirements:
  host:
    - python
    - pip
    - setuptools >=44
    - setuptools_scm >=3.4.3
    - toml
    - wheel
  run:
    - python
  run_constrained:
    - astroid >=2,<5

{% set deselect_tests = "" %}
# E   AssertionError: 'ast.Expr(value=ast.Constant(value=str()' != 'ast.Expr(value=ast.Constant(value=str() as doc))'
# E   - ast.Expr(value=ast.Constant(value=str()
# E   + ast.Expr(value=ast.Constant(value=str() as doc))]
{% set deselect_tests = "--deselect=tests/test_astroid.py::TestAstroid::test_sys_modules" %}  # [py<314]
{% set deselect_tests = deselect_tests + " --deselect=tests/test_mark_tokens.py::TestMarkTokens::test_sys_modules" %}  # [py<314]
# E   ModuleNotFoundError: No module named 'astroid.suppliermodule_test'
{% set ignore_tests = "--ignore=tests/testdata" %}

test:
  source_files:
    - tests
  imports:
    - asttokens
  requires:
    - pip
    - pytest
    - astroid
  commands:
    - pip check
    - pytest -v tests {{ ignore_tests }} {{ deselect_tests }}

about:
  home: https://github.com/gristlabs/asttokens
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: The asttokens module annotates Python abstract syntax trees (ASTs) with the positions of tokens and text in the source code that generated them.
  description: |
    The asttokens module annotates Python abstract syntax trees (ASTs) with the positions of tokens and text in the source code that generated them.
    It provides a way to access the original source code from the AST, which can be useful for debugging, code analysis, and other tasks.
  dev_url: https://github.com/gristlabs/asttokens
  doc_url: https://github.com/gristlabs/asttokens

extra:
  recipe-maintainers:
    - dopplershift
